name: VWAR Loop Life iOS package

on:
  pull_request:
    branches: [main]
    paths:
      - 'Strand/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'Packages/**'
      - 'Tools/verify-ios-*.py'
      - 'project.yml'
      - 'docs/VWAR_LOOP_LIFE_INSTALL.md'
      - '.github/workflows/vwar-loop-life-ios.yml'
  push:
    branches: [main]
    paths:
      - 'Strand/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'Packages/**'
      - 'Tools/verify-ios-*.py'
      - 'project.yml'
      - 'docs/VWAR_LOOP_LIFE_INSTALL.md'
      - '.github/workflows/vwar-loop-life-ios.yml'
  workflow_dispatch:

concurrency:
  group: vwar-loop-life-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare iPhone and iPad package
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("project.yml")
          text = path.read_text()
          needle = "\n      - target: NOOPWatch\n"
          if needle not in text:
              raise SystemExit("NOOPWatch dependency not found in project.yml")
          path.write_text(text.replace(needle, "\n", 1))
          PY

      - name: Verify Portuguese iOS 26 surface
        run: python3 Tools/verify-ios-ptbr.py

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned iPhone and iPad app
        run: >-
          xcodebuild -scheme NOOPiOS -configuration Release
          -destination 'generic/platform=iOS'
          -derivedDataPath "$PWD/build"
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          build

      - name: Create unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          lipo -archs "$APP_PATH/NOOP" | grep -qw arm64
          Tools/anonymize-ios-app.sh "$APP_PATH"
          mkdir -p artifact/Payload
          ditto "$APP_PATH" artifact/Payload/VWARLoopLife.app
          (
            cd artifact
            ditto -c -k --sequesterRsrc --keepParent Payload VWAR-Loop-Life-v10.0.0-ios.ipa
          )
          cp docs/VWAR_LOOP_LIFE_INSTALL.md artifact/README.md

      - name: Verify ready-to-sign IPA
        run: python3 Tools/verify-ios-ipa.py artifact/VWAR-Loop-Life-v10.0.0-ios.ipa

      - name: Upload ready-to-sign package
        uses: actions/upload-artifact@v4
        with:
          name: VWAR-Loop-Life-v10.0.0-iOS-ready-to-sign
          path: |
            artifact/VWAR-Loop-Life-v10.0.0-ios.ipa
            artifact/README.md
          if-no-files-found: error
          retention-days: 30
