name: VWAR Loop Life iOS release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "project.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: write

concurrency:
  group: release-ios-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apple:
    name: Build iPhone and iPad IPAs
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve and validate version
        run: |
          set -euo pipefail
          project_version="$(sed -n 's/.*MARKETING_VERSION:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' project.yml | head -n 1)"
          test -n "$project_version"
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            test "$version" = "$project_version" || {
              echo "A tag v$version diverge do MARKETING_VERSION $project_version" >&2
              exit 1
            }
          else
            version="$project_version"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "TAG=v$version" >> "$GITHUB_ENV"

      - name: Select Xcode 26.3 and install XcodeGen
        run: |
          set -euo pipefail
          test -d "$DEVELOPER_DIR"
          xcodebuild -version
          brew install xcodegen
          xcodegen --version

      - name: Verify Portuguese Health-only surface
        run: python3 Tools/verify-ios-ptbr.py

      - name: Test Health source provenance
        run: swift test --package-path Packages/StrandImport --filter HealthSourceClassifierTests

      - name: Generate iOS-only project
        run: |
          xcodegen generate

      - name: Build and verify device editions
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/dist"

          build_edition() {
            key="$1"
            profile="$2"
            family="$3"
            label="$4"
            app_bundle="$5"
            widget_bundle="$6"
            derived="build/ios-$key"
            stage="build/stage-$key"
            rm -rf "$derived" "$stage"

            settings="$(xcodebuild -project Strand.xcodeproj -target NOOPiOS -configuration Release \
              -showBuildSettings \
              TARGETED_DEVICE_FAMILY="$family" \
              VWAR_DEVICE_EDITION="$profile" \
              VWAR_APP_BUNDLE_ID="$app_bundle" \
              VWAR_WIDGET_BUNDLE_ID="$widget_bundle")"
            printf '%s\n' "$settings" | grep -Eq "^[[:space:]]*TARGETED_DEVICE_FAMILY = $family$"
            printf '%s\n' "$settings" | grep -Eq "^[[:space:]]*PRODUCT_BUNDLE_IDENTIFIER = $app_bundle$"
            widget_settings="$(xcodebuild -project Strand.xcodeproj -target NOOPiOSWidgets -configuration Release \
              -showBuildSettings \
              TARGETED_DEVICE_FAMILY="$family" \
              VWAR_WIDGET_BUNDLE_ID="$widget_bundle")"
            printf '%s\n' "$widget_settings" | grep -Eq "^[[:space:]]*TARGETED_DEVICE_FAMILY = $family$"
            printf '%s\n' "$widget_settings" | grep -Eq "^[[:space:]]*PRODUCT_BUNDLE_IDENTIFIER = $widget_bundle$"

            xcodebuild -scheme NOOPiOS -configuration Release \
              -destination 'generic/platform=iOS' \
              -derivedDataPath "$derived" \
              TARGETED_DEVICE_FAMILY="$family" \
              VWAR_DEVICE_EDITION="$profile" \
              VWAR_APP_BUNDLE_ID="$app_bundle" \
              VWAR_WIDGET_BUNDLE_ID="$widget_bundle" \
              ARCHS=arm64 ONLY_ACTIVE_ARCH=NO \
              CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
              build

            app="$derived/Build/Products/Release-iphoneos/NOOP.app"
            test -d "$app"
            Tools/anonymize-ios-app.sh "$app"
            test "$(lipo -archs "$app/NOOP")" = arm64
            xcrun vtool -show-build "$app/NOOP" | grep -Eq '^[[:space:]]*platform[[:space:]]+IOS([[:space:]]|$)'
            xcrun vtool -show-build "$app/NOOP" | grep -Eq '^[[:space:]]*minos[[:space:]]+26\.0([[:space:]]|$)'
            test ! -d "$app/Watch"
            test "$(find "$app/PlugIns" -maxdepth 1 -type d -name '*.appex' | wc -l | xargs)" = "1"
            widget="$(find "$app/PlugIns" -maxdepth 1 -type d -name '*.appex' | head -n 1)"
            widget_executable="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$widget/Info.plist")"
            test "$(lipo -archs "$widget/$widget_executable")" = arm64
            xcrun vtool -show-build "$widget/$widget_executable" | grep -Eq '^[[:space:]]*platform[[:space:]]+IOS([[:space:]]|$)'
            xcrun vtool -show-build "$widget/$widget_executable" | grep -Eq '^[[:space:]]*minos[[:space:]]+26\.0([[:space:]]|$)'

            mkdir -p "$stage/Payload"
            ditto "$app" "$stage/Payload/VWARLoopLife.app"
            ipa="$GITHUB_WORKSPACE/dist/VWAR-Loop-Life-v${VERSION}-${label}.ipa"
            ditto -c -k --sequesterRsrc --keepParent "$stage/Payload" "$ipa"
            python3 Tools/verify-ios-ipa.py "$ipa" "$key"
          }

          build_edition iphone iphone-16-pro-max 1 iPhone-16-Pro-Max-iOS26 \
            com.noopapp.noop.iphone com.noopapp.noop.iphone.widgets
          build_edition ipad ipad-pro-m2-12-9 2 iPad-Pro-M2-12.9-iPadOS26 \
            com.noopapp.noop.ipad com.noopapp.noop.ipad.widgets
          ls -lh "$GITHUB_WORKSPACE/dist/"*.ipa

      - name: Upload IPAs
        uses: actions/upload-artifact@v4
        with:
          name: vwar-loop-life-v11.1.0-ios26-ipas
          path: dist/*.ipa
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: apple
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          set -euo pipefail
          version="$(sed -n 's/.*MARKETING_VERSION:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' project.yml | head -n 1)"
          test -n "$version"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "TAG=v$version" >> "$GITHUB_ENV"

      - name: Download built IPAs
        uses: actions/download-artifact@v4
        with:
          name: vwar-loop-life-v11.1.0-ios26-ipas
          path: dist

      - name: Publish or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes="VWAR Loop Life ${TAG}: nova interface iOS 26 refeita do zero, duas edições arm64 dedicadas a iPhone 16 Pro Max e iPad Pro M2 12,9, fluxo G Band e Strava pelo app Saúde e interface integralmente em pt-BR."
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" --title "VWAR Loop Life ${TAG}" --notes "$notes" --latest
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" --title "VWAR Loop Life ${TAG}" --notes "$notes" --latest
          fi
