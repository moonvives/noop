name: VWAR Loop Life release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "project.yml"
      - ".github/workflows/release.yml"

permissions:
  contents: write

concurrency:
  group: release-artifacts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apple:
    name: Build Apple artifacts
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/.*MARKETING_VERSION:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' project.yml | head -n 1)"
            test -n "$version"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "Building Apple artifacts for v$version"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build macOS app
        run: |
          set -euo pipefail
          rm -rf build/release-dd
          xcodebuild -scheme Strand -configuration Release \
            -derivedDataPath build/release-dd \
            -destination 'generic/platform=macOS' \
            ARCHS="x86_64 arm64" ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO build
          app="build/release-dd/Build/Products/Release/NOOP.app"
          test -d "$app"
          lipo -info "$app/Contents/MacOS/NOOP"
          lipo -info "$app/Contents/MacOS/NOOP" | grep -E 'x86_64.*arm64|arm64.*x86_64'
          Tools/anonymize-macos-app.sh "$app"
          staged="build/VWAR Loop Life.app"
          rm -rf "$staged"
          ditto "$app" "$staged"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$staged" "dist/VWAR-Loop-Life-v${VERSION}-macos.zip"

      - name: Build unsigned iOS IPA
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("project.yml")
          text = path.read_text()
          needle = "\n      - target: NOOPWatch\n"
          if needle not in text:
              raise SystemExit("NOOPWatch dependency not found in project.yml")
          path.write_text(text.replace(needle, "\n", 1))
          PY
          xcodegen generate
          rm -rf build/ios-dd build/ios-stage
          xcodebuild -scheme NOOPiOS -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios-dd \
            CODE_SIGNING_ALLOWED=NO build
          app="build/ios-dd/Build/Products/Release-iphoneos/NOOP.app"
          test -d "$app"
          Tools/anonymize-ios-app.sh "$app"
          stage="build/ios-stage"
          mkdir -p "$GITHUB_WORKSPACE/dist"
          rm -rf "$stage"
          mkdir -p "$stage/Payload"
          ditto "$app" "$stage/Payload/VWARLoopLife.app"
          rm -rf "$stage/Payload/VWARLoopLife.app/Watch"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$stage/Payload" "$GITHUB_WORKSPACE/dist/VWAR-Loop-Life-v${VERSION}-ios.ipa"
          ls -lh "$GITHUB_WORKSPACE/dist/VWAR-Loop-Life-v${VERSION}-ios.ipa"

      - name: Upload Apple artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vwar-loop-life-apple-artifacts
          path: |
            dist/VWAR-Loop-Life-v*-macos.zip
            dist/VWAR-Loop-Life-v*-ios.ipa
          if-no-files-found: error

  android:
    name: Build Android artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/.*MARKETING_VERSION:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' project.yml | head -n 1)"
            test -n "$version"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "Building Android artifact for v$version"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build full release APK
        run: ./gradlew assembleFullRelease
        working-directory: android

      - name: Collect Android artifact
        run: |
          set -euo pipefail
          mkdir -p dist
          cp android/app/build/outputs/apk/full/release/app-full-release.apk "dist/VWAR-Loop-Life-v${VERSION}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: vwar-loop-life-android-artifact
          path: dist/VWAR-Loop-Life-v*.apk
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - apple
      - android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/.*MARKETING_VERSION:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}.*/\1/p' project.yml | head -n 1)"
            test -n "$version"
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "TAG=v$version" >> "$GITHUB_ENV"

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vwar-loop-life-*
          path: dist
          merge-multiple: true

      - name: Publish or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ls -lh dist
          notes="VWAR Loop Life ${TAG}: integração Garmin com origem verificável, Bluetooth ao vivo, importação offline e pacotes prontos para assinatura."
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" --title "VWAR Loop Life ${TAG}" --notes "$notes" --latest
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" --title "VWAR Loop Life ${TAG}" --notes "$notes" --latest
          fi
