name: VWAR desktop collector

on:
  pull_request:
    branches: [main]
    paths:
      - 'Packages/VWARProtocol/**'
      - 'docs/VWAR_DESKTOP_COLLECTOR.md'
      - '.github/workflows/vwar-desktop.yml'
  push:
    branches: [main]
    paths:
      - 'Packages/VWARProtocol/**'
      - 'docs/VWAR_DESKTOP_COLLECTOR.md'
      - '.github/workflows/vwar-desktop.yml'
  workflow_dispatch:

concurrency:
  group: vwar-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test protocol core
        run: swift test --package-path Packages/VWARProtocol

      - name: Build desktop collector
        run: >-
          swift build -c release
          --package-path Packages/VWARProtocol
          --product vitae-vwar-capture

      - name: Package macOS binary
        run: |
          mkdir -p artifact
          cp Packages/VWARProtocol/.build/release/vitae-vwar-capture artifact/
          cp docs/VWAR_DESKTOP_COLLECTOR.md artifact/README.md
          chmod +x artifact/vitae-vwar-capture

      - name: Upload desktop collector
        uses: actions/upload-artifact@v4
        with:
          name: VITAE-VWAR-Desktop-macOS
          path: artifact/
          if-no-files-found: error
          retention-days: 14
