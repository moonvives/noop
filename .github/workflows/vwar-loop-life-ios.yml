name: VWAR Loop Life device editions

on:
  pull_request:
    branches: [main]
    paths:
      - 'Strand/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'Packages/**'
      - 'Tools/verify-ios-*.py'
      - 'project.yml'
      - 'docs/VWAR_LOOP_LIFE_INSTALL.md'
      - '.github/workflows/vwar-loop-life-ios.yml'
  push:
    branches: [main]
    paths:
      - 'Strand/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'Packages/**'
      - 'Tools/verify-ios-*.py'
      - 'project.yml'
      - 'docs/VWAR_LOOP_LIFE_INSTALL.md'
      - '.github/workflows/vwar-loop-life-ios.yml'
  workflow_dispatch:

concurrency:
  group: vwar-loop-life-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: iphone
            profile: iphone-16-pro-max
            family: '1'
            label: iPhone-16-Pro-Max
            app_bundle: com.noopapp.noop.iphone
            widget_bundle: com.noopapp.noop.iphone.widgets
          - key: ipad
            profile: ipad-pro-m2-12-9
            family: '2'
            label: iPad-Pro-M2-12.9
            app_bundle: com.noopapp.noop.ipad
            widget_bundle: com.noopapp.noop.ipad.widgets
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare dedicated package
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("project.yml")
          text = path.read_text()
          needle = "\n      - target: NOOPWatch\n"
          if needle not in text:
              raise SystemExit("NOOPWatch dependency not found in project.yml")
          path.write_text(text.replace(needle, "\n", 1))
          PY

      - name: Verify Portuguese iOS 26 surface
        run: python3 Tools/verify-ios-ptbr.py

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build ${{ matrix.label }} app
        run: >-
          xcodebuild -scheme NOOPiOS -configuration Release
          -destination 'generic/platform=iOS'
          -derivedDataPath "$PWD/build-${{ matrix.key }}"
          TARGETED_DEVICE_FAMILY='${{ matrix.family }}'
          VWAR_DEVICE_EDITION='${{ matrix.profile }}'
          VWAR_APP_BUNDLE_ID='${{ matrix.app_bundle }}'
          VWAR_WIDGET_BUNDLE_ID='${{ matrix.widget_bundle }}'
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          build

      - name: Create ${{ matrix.label }} IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find 'build-${{ matrix.key }}/Build/Products/Release-iphoneos' -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          lipo -archs "$APP_PATH/NOOP" | grep -qw arm64
          Tools/anonymize-ios-app.sh "$APP_PATH"
          mkdir -p 'artifact-${{ matrix.key }}/Payload'
          ditto "$APP_PATH" 'artifact-${{ matrix.key }}/Payload/VWARLoopLife.app'
          (
            cd 'artifact-${{ matrix.key }}'
            ditto -c -k --sequesterRsrc --keepParent Payload 'VWAR-Loop-Life-v11.0.0-${{ matrix.label }}.ipa'
          )
          cp docs/VWAR_LOOP_LIFE_INSTALL.md 'artifact-${{ matrix.key }}/README.md'

      - name: Verify ready-to-sign IPA
        run: >-
          python3 Tools/verify-ios-ipa.py
          'artifact-${{ matrix.key }}/VWAR-Loop-Life-v11.0.0-${{ matrix.label }}.ipa'
          '${{ matrix.key }}'

      - name: Upload ready-to-sign package
        uses: actions/upload-artifact@v4
        with:
          name: VWAR-Loop-Life-v11.0.0-${{ matrix.label }}-ready-to-sign
          path: |
            artifact-${{ matrix.key }}/VWAR-Loop-Life-v11.0.0-${{ matrix.label }}.ipa
            artifact-${{ matrix.key }}/README.md
          if-no-files-found: error
          retention-days: 30
