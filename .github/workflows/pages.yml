name: VITAE One VWAR Loop Life site

on:
  push:
    branches: [main]
    paths:
      - 'docs/index.html'
      - 'docs/site.css'
      - 'docs/site.js'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: vitae-one-vwar-loop-life-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
