name: VITAE iOS package

on:
  pull_request:
    branches: [main]
    paths:
      - 'Strand/**'
      - 'StrandiOS/**'
      - 'StrandiOSShared/**'
      - 'StrandiOSWidgets/**'
      - 'Packages/**'
      - 'project.yml'
      - 'docs/VITAE_INSTALL.md'
      - '.github/workflows/vitae-ios-package.yml'
  workflow_dispatch:

concurrency:
  group: vitae-ios-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare iPhone-only package
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("project.yml")
          text = path.read_text()
          needle = "\n      - target: NOOPWatch\n"
          if needle not in text:
              raise SystemExit("NOOPWatch dependency not found in project.yml")
          path.write_text(text.replace(needle, "\n", 1))
          PY

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned iPhone app
        run: >-
          xcodebuild -scheme NOOPiOS -configuration Release
          -destination 'generic/platform=iOS'
          -derivedDataPath "$PWD/build"
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
          build

      - name: Create unsigned IPA
        run: |
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          test -n "$APP_PATH"
          mkdir -p artifact/Payload
          ditto "$APP_PATH" artifact/Payload/VITAEOne.app
          (
            cd artifact
            ditto -c -k --sequesterRsrc --keepParent Payload VITAE-One-unsigned.ipa
          )
          cp docs/VITAE_INSTALL.md artifact/README.md

      - name: Upload ready-to-sign package
        uses: actions/upload-artifact@v4
        with:
          name: VITAE-One-iOS-ready-to-sign
          path: |
            artifact/VITAE-One-unsigned.ipa
            artifact/README.md
          if-no-files-found: error
          retention-days: 14
